<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约信息</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 60px 50px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .line1 {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        .line2 {
            font-size: 28px;
            color: #666;
        }
        @media (max-width: 480px) {
            .card { padding: 40px 30px; }
            .line1 { font-size: 26px; }
            .line2 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="line1">江苏省中医药博物馆已预约</div>
        <div class="line2">2026年6月18日</div>
    </div>
</body>
</html>
